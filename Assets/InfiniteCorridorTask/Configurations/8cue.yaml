# 4-Cue Initial Experiment Configuration
# Cyclic 4-cue trial with reward zone at the end of the corridor.

unity_scene_name: "IvanScene"
cue_offset_cm: 10.0

cues:
  - name: "Gray" # There isn't actually any gray regions in this task
    code: 0
    length_cm: 1.0
  - name: "A"
    code: 1
    length_cm: 50.0
  - name: "B"
    code: 2
    length_cm: 50.0
  - name: "C"
    code: 3
    length_cm: 50.0
  - name: "D"
    code: 4
    length_cm: 50.0
  - name: "E"
    code: 5
    length_cm: 50.0
  - name: "F"
    code: 6
    length_cm: 50.0
  - name: "G"
    code: 7
    length_cm: 50.0
  - name: "H"
    code: 8
    length_cm: 50.0
segments:
  - name: "Segment_abcdefgh"
    cue_sequence: ["A", "B", "C", "D", "E", "F", "G", "H"]

vr_environment:
  corridor_spacing_cm: 20.0
  segments_per_corridor: 3
  padding_prefab_name: "Padding"
  cm_per_unity_unit: 10.0

trial_structures:
  cyclic_8_cue:
    segment_name: "Segment_abcdefgh"
    stimulus_trigger_zone_start_cm: 358.0
    stimulus_trigger_zone_end_cm: 392.0
    stimulus_location_cm: 375.0
    show_stimulus_collision_boundary: false
    reward_size_ul: 5.0
    reward_tone_duration_ms: 300

experiment_states:
  rest_1:
    experiment_state_code: 1
    system_state_code: 1
    state_duration_s: 600.0
    supported_trial_structures: ["cyclic_8_cue"]
    reinforcing_initial_guided_trials: 0
    reinforcing_recovery_failed_threshold: 0
    reinforcing_recovery_guided_trials: 0

  run_1:
    experiment_state_code: 2
    system_state_code: 2
    state_duration_s: 1200.0
    supported_trial_structures: ["cyclic_8_cue"]
    reinforcing_initial_guided_trials: 3
    reinforcing_recovery_failed_threshold: 6
    reinforcing_recovery_guided_trials: 3

  rest_2:
    experiment_state_code: 3
    system_state_code: 1
    state_duration_s: 600.0
    supported_trial_structures: ["cyclic_8_cue"]
    reinforcing_initial_guided_trials: 0
    reinforcing_recovery_failed_threshold: 0
    reinforcing_recovery_guided_trials: 0

  run_2:
    experiment_state_code: 4
    system_state_code: 2
    state_duration_s: 1200.0
    supported_trial_structures: ["cyclic_8_cue"]
    reinforcing_initial_guided_trials: 3
    reinforcing_recovery_failed_threshold: 6
    reinforcing_recovery_guided_trials: 3

  rest_3:
    experiment_state_code: 5
    system_state_code: 1
    state_duration_s: 600.0
    supported_trial_structures: ["cyclic_8_cue"]
    reinforcing_initial_guided_trials: 0
    reinforcing_recovery_failed_threshold: 0
    reinforcing_recovery_guided_trials: 0
