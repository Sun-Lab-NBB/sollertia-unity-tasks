# Project: StateSpaceOdyssey
# Purpose: Teaches the ABDC (extension) segment structure before shortcut trials.
# Layout:  Segment ABDC with the rewarding stimulus (water) trigger zone in cue C.
# Related: SSO_Extension_Shortcut (introduces the ABC shortcut)

cue_offset_cm: 10.0

cues:
  - name: "Gray"
    code: 0
    length_cm: 40.0
  - name: "A"
    code: 1
    length_cm: 40.0
  - name: "B"
    code: 2
    length_cm: 40.0
  - name: "C"
    code: 3
    length_cm: 40.0
  - name: "D"
    code: 4
    length_cm: 40.0

segments:
  - name: "Segment_abdc_40cm"
    cue_sequence: ["A", "Gray", "B", "Gray", "D", "Gray", "C", "Gray"]

vr_environment:
  corridor_spacing_cm: 20.0
  segments_per_corridor: 3
  padding_prefab_name: "Padding"
  cm_per_unity_unit: 10.0

trial_structures:
  ABDC:
    segment_name: "Segment_abdc_40cm"
    stimulus_trigger_zone_start_cm: 248.0
    stimulus_trigger_zone_end_cm: 272.0
    stimulus_location_cm: 268.0
    show_stimulus_collision_boundary: false
    trigger_type: "lick"
