# Project: StateSpaceOdyssey
# Purpose: Merges ABC and AGFE trial structures by sharing the A cue.
# Layout:  Segment ABC with the rewarding stimulus (water) trigger zone in cue C.
#          Segment AGFE with the rewarding stimulus (water) trigger zone in cue E.
# Related: SSO_Shared_Base (ABC base training), SSO_Merging_Base (AGFE base training)

cue_offset_cm: 10.0

cues:
  - name: "Gray"
    code: 0
    length_cm: 40.0
  - name: "A"
    code: 1
    length_cm: 40.0
  - name: "B"
    code: 2
    length_cm: 40.0
  - name: "C"
    code: 3
    length_cm: 40.0
  - name: "D"
    code: 4
    length_cm: 40.0
  - name: "E"
    code: 5
    length_cm: 40.0
  - name: "F"
    code: 6
    length_cm: 40.0
  - name: "G"
    code: 7
    length_cm: 40.0


segments:
  - name: "Segment_abc_40cm"
    cue_sequence: ["A", "Gray", "B", "Gray", "C", "Gray"]
    transition_probabilities: [0.5, 0.5]

  - name: "Segment_agfe_40cm"
    cue_sequence: ["A", "Gray", "G", "Gray", "F", "Gray", "E", "Gray"]
    transition_probabilities: [0.5, 0.5]

vr_environment:
  corridor_spacing_cm: 20.0
  segments_per_corridor: 3
  padding_prefab_name: "Padding"
  cm_per_unity_unit: 10.0

trial_structures:
  ABC:
    segment_name: "Segment_abc_40cm"
    stimulus_trigger_zone_start_cm: 168.0
    stimulus_trigger_zone_end_cm: 192.0
    stimulus_location_cm: 188.0
    show_stimulus_collision_boundary: false
    trigger_type: "lick"
  AGFE:
    segment_name: "Segment_agfe_40cm"
    stimulus_trigger_zone_start_cm: 168.0
    stimulus_trigger_zone_end_cm: 192.0
    stimulus_location_cm: 188.0
    show_stimulus_collision_boundary: false
    trigger_type: "lick"
