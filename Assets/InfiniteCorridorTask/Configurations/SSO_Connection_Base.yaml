# Project: StateSpaceOdyssey
# Purpose: Teaches the DEFG segment structure before connection trials.
# Layout:  Segment DEFG with the rewarding stimulus (water) trigger zone in cue G.
# Related: SSO_Shared_Base (ABC base training), SSO_Connection (ABC-DEFG connection trials)

cue_offset_cm: 10.0

cues:
  - name: "Gray"
    code: 0
    length_cm: 40.0
  - name: "A"
    code: 1
    length_cm: 40.0
  - name: "B"
    code: 2
    length_cm: 40.0
  - name: "C"
    code: 3
    length_cm: 40.0
  - name: "D"
    code: 4
    length_cm: 40.0
  - name: "E"
    code: 5
    length_cm: 40.0
  - name: "F"
    code: 6
    length_cm: 40.0
  - name: "G"
    code: 7
    length_cm: 40.0


segments:
  - name: "Segment_defg_40cm"
    cue_sequence: ["D", "Gray", "E", "Gray", "F", "Gray", "G", "Gray"]

vr_environment:
  corridor_spacing_cm: 20.0
  segments_per_corridor: 3
  padding_prefab_name: "Padding"
  cm_per_unity_unit: 10.0

trial_structures:
  DEFG:
    segment_name: "Segment_defg_40cm"
    stimulus_trigger_zone_start_cm: 248.0
    stimulus_trigger_zone_end_cm: 272.0
    stimulus_location_cm: 268.0
    show_stimulus_collision_boundary: false
    trigger_type: "lick"
