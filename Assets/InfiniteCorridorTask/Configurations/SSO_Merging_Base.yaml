# Project: StateSpaceOdyssey
# Purpose: Teaches the AGFE segment structure before merging trials.
# Layout:  Segment AGFE with the rewarding stimulus (water) trigger zone in cue E.
# Related: SSO_Shared_Base (ABC base training), SSO_Merging (combined ABC/AGFE trials)

unity_scene_name: "SSO_Merging_Base"
cue_offset_cm: 10.0

cues:
  - name: "Gray"
    code: 0
    length_cm: 40.0
  - name: "A"
    code: 1
    length_cm: 40.0
  - name: "B"
    code: 2
    length_cm: 40.0
  - name: "C"
    code: 3
    length_cm: 40.0
  - name: "D"
    code: 4
    length_cm: 40.0
  - name: "E"
    code: 5
    length_cm: 40.0
  - name: "F"
    code: 6
    length_cm: 40.0
  - name: "G"
    code: 7
    length_cm: 40.0

segments:
  - name: "Segment_agfe_40cm"
    cue_sequence: ["A", "Gray", "G", "Gray", "F", "Gray", "E", "Gray"]

vr_environment:
  corridor_spacing_cm: 20.0
  segments_per_corridor: 3
  padding_prefab_name: "Padding"
  cm_per_unity_unit: 10.0

trial_structures:
  AGFE:
    segment_name: "Segment_agfe_40cm"
    stimulus_trigger_zone_start_cm: 168.0
    stimulus_trigger_zone_end_cm: 192.0
    stimulus_location_cm: 188.0
    show_stimulus_collision_boundary: false
    reward_size_ul: 5.0
    reward_tone_duration_ms: 300

experiment_states:
  baseline:
    experiment_state_code: 1
    system_state_code: 1
    state_duration_s: 300.0
    supports_trials: false
    supported_trial_structures: ["AGFE"]
    reinforcing_initial_guided_trials: 0
    reinforcing_recovery_failed_threshold: 0
    reinforcing_recovery_guided_trials: 0
    aversive_initial_guided_trials: 0
    aversive_recovery_failed_threshold: 0
    aversive_recovery_guided_trials: 0

  run:
    experiment_state_code: 2
    system_state_code: 2
    state_duration_s: 3600.0
    supports_trials: true
    supported_trial_structures: ["AGFE"]
    reinforcing_initial_guided_trials: 3
    reinforcing_recovery_failed_threshold: 8
    reinforcing_recovery_guided_trials: 2
    aversive_initial_guided_trials: 0
    aversive_recovery_failed_threshold: 0
    aversive_recovery_guided_trials: 0

  cooldown:
    experiment_state_code: 3
    system_state_code: 1
    state_duration_s: 300.0
    supports_trials: false
    supported_trial_structures: ["AGFE"]
    reinforcing_initial_guided_trials: 0
    reinforcing_recovery_failed_threshold: 0
    reinforcing_recovery_guided_trials: 0
    aversive_initial_guided_trials: 0
    aversive_recovery_failed_threshold: 0
    aversive_recovery_guided_trials: 0
