# Defines an experiment that uses connection trial structures (ABC/ABCA with reward at C, DEFG/DEFGD with reward at G).
# This experiment configuration is used for the StateSpaceOdyssey cohorts 1 and above.

unity_scene_name: "StateSpaceOdyssey_Connection"
cue_offset_cm: 10.0

cues:
  - name: "Gray"
    code: 0
    length_cm: 40.0
  - name: "A"
    code: 1
    length_cm: 40.0
  - name: "B"
    code: 2
    length_cm: 40.0
  - name: "C"
    code: 3
    length_cm: 40.0
  - name: "D"
    code: 4
    length_cm: 40.0
  - name: "E"
    code: 5
    length_cm: 40.0
  - name: "F"
    code: 6
    length_cm: 40.0
  - name: "G"
    code: 7
    length_cm: 40.0


segments:
  - name: "Segment_abc_40cm"
    cue_sequence: ["A", "Gray", "B", "Gray", "C", "Gray"]
    transition_probabilities: [0.5, 0.5, 0.0, 0.0]

  - name: "Segment_abca_40cm"
    cue_sequence: ["A", "Gray", "B", "Gray", "C", "Gray", "A", "Gray"]
    transition_probabilities: [0.0, 0.0, 0.5, 0.5]

  - name: "Segment_defg_40cm"
    cue_sequence: ["D", "Gray", "E", "Gray", "F", "Gray", "G", "Gray"]
    transition_probabilities: [0.0, 0.0, 0.5, 0.5]

  - name: "Segment_defgd_40cm"
    cue_sequence: ["D", "Gray", "E", "Gray", "F", "Gray", "G", "Gray", "D", "Gray"]
    transition_probabilities: [0.5, 0.5, 0.0, 0.0]


vr_environment:
  corridor_spacing_cm: 20.0
  segments_per_corridor: 3
  padding_prefab_name: "Padding"
  cm_per_unity_unit: 10.0

trial_structures:
  ABC:
    segment_name: "Segment_abc_40cm"
    stimulus_trigger_zone_start_cm: 168.0
    stimulus_trigger_zone_end_cm: 192.0
    stimulus_location_cm: 188.0
    show_stimulus_collision_boundary: false
    reward_size_ul: 5.0
    reward_tone_duration_ms: 300

  ABCA:
    segment_name: "Segment_abca_40cm"
    stimulus_trigger_zone_start_cm: 168.0
    stimulus_trigger_zone_end_cm: 192.0
    stimulus_location_cm: 188.0
    show_stimulus_collision_boundary: false
    reward_size_ul: 5.0
    reward_tone_duration_ms: 300

  DEFG:
    segment_name: "Segment_defg_40cm"
    stimulus_trigger_zone_start_cm: 248.0
    stimulus_trigger_zone_end_cm: 272.0
    stimulus_location_cm: 268.0
    show_stimulus_collision_boundary: false
    reward_size_ul: 5.0
    reward_tone_duration_ms: 300

  DEFGD:
    segment_name: "Segment_defgd_40cm"
    stimulus_trigger_zone_start_cm: 248.0
    stimulus_trigger_zone_end_cm: 272.0
    stimulus_location_cm: 268.0
    show_stimulus_collision_boundary: false
    reward_size_ul: 5.0
    reward_tone_duration_ms: 300


experiment_states:
  baseline:
    experiment_state_code: 1
    system_state_code: 1
    state_duration_s: 300.0
    supports_trials: false
    supported_trial_structures: ["ABC", "ABCA", "DEFG", "DEFGD"]
    reinforcing_initial_guided_trials: 0
    reinforcing_recovery_failed_threshold: 0
    reinforcing_recovery_guided_trials: 0
    aversive_initial_guided_trials: 0
    aversive_recovery_failed_threshold: 0
    aversive_recovery_guided_trials: 0

  run:
    experiment_state_code: 2
    system_state_code: 2
    state_duration_s: 3600.0
    supports_trials: true
    supported_trial_structures: ["ABC", "ABCA", "DEFG", "DEFGD"]
    reinforcing_initial_guided_trials: 3
    reinforcing_recovery_failed_threshold: 8
    reinforcing_recovery_guided_trials: 2
    aversive_initial_guided_trials: 0
    aversive_recovery_failed_threshold: 0
    aversive_recovery_guided_trials: 0

  cooldown:
    experiment_state_code: 3
    system_state_code: 1
    state_duration_s: 300.0
    supports_trials: false
    supported_trial_structures: ["ABC", "ABCA", "DEFG", "DEFGD"]
    reinforcing_initial_guided_trials: 0
    reinforcing_recovery_failed_threshold: 0
    reinforcing_recovery_guided_trials: 0
    aversive_initial_guided_trials: 0
    aversive_recovery_failed_threshold: 0
    aversive_recovery_guided_trials: 0
