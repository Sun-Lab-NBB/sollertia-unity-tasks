# Project: MaalstroomicFlow
# Purpose: Defines a cyclic 8-cue corridor with a rewarding stimulus trigger zone at the end of the corridor.
# Layout:  Segment ABCDEFGH with the rewarding stimulus (water) trigger zone in cue H.
# Related: MF_Aversion_Reward (extends the task to allow studying both reward and aversion coding).

unity_scene_name: "MF_Reward"
cue_offset_cm: 10.0

cues:
  - name: "Gray" # This is a placeholder, the task does not use Gray cues.
    code: 0
    length_cm: 1.0
  - name: "A"
    code: 1
    length_cm: 50.0
  - name: "B"
    code: 2
    length_cm: 50.0
  - name: "C"
    code: 3
    length_cm: 50.0
  - name: "D"
    code: 4
    length_cm: 50.0
  - name: "E"
    code: 5
    length_cm: 50.0
  - name: "F"
    code: 6
    length_cm: 50.0
  - name: "G"
    code: 7
    length_cm: 50.0
  - name: "H"
    code: 8
    length_cm: 50.0
segments:
  - name: "Segment_abcdefgh"
    cue_sequence: ["A", "B", "C", "D", "E", "F", "G", "H"]

vr_environment:
  corridor_spacing_cm: 20.0
  segments_per_corridor: 3
  padding_prefab_name: "Padding"
  cm_per_unity_unit: 10.0

trial_structures:
  cyclic_8_cue:
    segment_name: "Segment_abcdefgh"
    stimulus_trigger_zone_start_cm: 357.5
    stimulus_trigger_zone_end_cm: 392.5
    stimulus_location_cm: 388.5
    show_stimulus_collision_boundary: false
    reward_size_ul: 5.0
    reward_tone_duration_ms: 300

experiment_states:
  baseline:
    experiment_state_code: 1
    system_state_code: 1
    state_duration_s: 600.0
    supports_trials: false
    supported_trial_structures: ["cyclic_8_cue"]
    reinforcing_initial_guided_trials: 0
    reinforcing_recovery_failed_threshold: 0
    reinforcing_recovery_guided_trials: 0
    aversive_initial_guided_trials: 0
    aversive_recovery_failed_threshold: 0
    aversive_recovery_guided_trials: 0

  experiment:
    experiment_state_code: 2
    system_state_code: 2
    state_duration_s: 3000.0
    supports_trials: true
    supported_trial_structures: ["cyclic_8_cue"]
    reinforcing_initial_guided_trials: 3
    reinforcing_recovery_failed_threshold: 6
    reinforcing_recovery_guided_trials: 3
    aversive_initial_guided_trials: 0
    aversive_recovery_failed_threshold: 0
    aversive_recovery_guided_trials: 0

  cooldown:
    experiment_state_code: 3
    system_state_code: 1
    state_duration_s: 600.0
    supports_trials: false
    supported_trial_structures: ["cyclic_8_cue"]
    reinforcing_initial_guided_trials: 0
    reinforcing_recovery_failed_threshold: 0
    reinforcing_recovery_guided_trials: 0
    aversive_initial_guided_trials: 0
    aversive_recovery_failed_threshold: 0
    aversive_recovery_guided_trials: 0
