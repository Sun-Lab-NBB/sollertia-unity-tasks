# Extension-Shortcut Experiment Configuration
# Unified YAML configuration for the Mesoscope VR behavioral task.
# This file serves both the Unity VR environment and the Python data acquisition/analysis systems.

# Unity scene metadata
unity_scene_name: "IvanScene"
cue_offset_cm: 10.0

# Cue definitions - single source of truth
# Each cue has a unique name (used in segment cue sequences), a unique uint8 code (for MQTT/analysis),
# and a length in centimeters.
cues:
  - name: "Gray" # There isn't actually any gray regions in this task
    code: 0
    length_cm: 1.0
  - name: "A"
    code: 1
    length_cm: 50.0
  - name: "B"
    code: 2
    length_cm: 50.0
  - name: "C"
    code: 3
    length_cm: 50.0
  - name: "D"
    code: 4
    length_cm: 50.0
  - name: "E"
    code: 5
    length_cm: 50.0
  - name: "F"
    code: 6
    length_cm: 50.0
  - name: "G"
    code: 7
    length_cm: 50.0
  - name: "H"
    code: 8
    length_cm: 50.0

# Visual segment definitions for Unity corridor system
# Each segment is a sequence of cues with optional transition probabilities.
segments:
  - name: "Segment_airPuff1"
    cue_sequence: ["A", "B", "C", "D"]
    transition_probabilities: [0.0, 1.0]

  - name: "Segment_airPuff2"
    cue_sequence: ["E", "F", "G", "H"]
    transition_probabilities: [1.0, 0.0]

# VR environment configuration
vr_environment:
  corridor_spacing_cm: 20.0
  segments_per_corridor: 3
  padding_prefab_name: "Padding"
  cm_per_unity_unit: 10.0

# Trial structures - behavioral overlays on segments
# These are WaterRewardTrial types with lick-triggered rewards
trial_structures:
  ABCD:
    segment_name: "Segment_abc"
    stimulus_trigger_zone_start_cm: 158.0
    stimulus_trigger_zone_end_cm: 192.0
    stimulus_location_cm: 175.0
    show_stimulus_collision_boundary: false
    reward_size_ul: 5.0
    reward_tone_duration_ms: 300

  EFGH:
    segment_name: "Segment_abdc"
    stimulus_trigger_zone_start_cm: 158.0
    stimulus_trigger_zone_end_cm: 192.0
    stimulus_location_cm: 175.0
    show_stimulus_collision_boundary: false
    reward_size_ul: 5.0
    reward_tone_duration_ms: 300

# Experiment state machine
# Defines the phases/states of the experiment and which trials are used in each.
experiment_states:
  baseline:
    experiment_state_code: 1
    system_state_code: 1
    state_duration_s: 300.0
    supported_trial_structures: ["ABCD", "EFGH"]
    reinforcing_initial_guided_trials: 0
    reinforcing_recovery_failed_threshold: 0
    reinforcing_recovery_guided_trials: 0

  run:
    experiment_state_code: 2
    system_state_code: 2
    state_duration_s: 3600.0
    supported_trial_structures: ["ABCD", "EFGH"]
    reinforcing_initial_guided_trials: 3
    reinforcing_recovery_failed_threshold: 8
    reinforcing_recovery_guided_trials: 2

  cooldown:
    experiment_state_code: 3
    system_state_code: 1
    state_duration_s: 300.0
    supported_trial_structures: ["ABCD", "EFGH"]
    reinforcing_initial_guided_trials: 0
    reinforcing_recovery_failed_threshold: 0
    reinforcing_recovery_guided_trials: 0
