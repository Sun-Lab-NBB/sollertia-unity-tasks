# Defines an experiment that uses a cyclic 8-cue trial structure with an aversion zone in the middle of the corridor and
# a reward zone at the end of the corridor.
# This experiment configuration was used for the MaalstroomicFlow cohorts 1 and above for the second and third (last)
# weeks of the experiment protocol.

unity_scene_name: "IvanScene"
cue_offset_cm: 10.0

cues:
  - name: "Gray" # There isn't actually any gray regions in this task
    code: 0
    length_cm: 1.0
  - name: "A"
    code: 1
    length_cm: 50.0
  - name: "B"
    code: 2
    length_cm: 50.0
  - name: "C"
    code: 3
    length_cm: 50.0
  - name: "D"
    code: 4
    length_cm: 50.0
  - name: "E"
    code: 5
    length_cm: 50.0
  - name: "F"
    code: 6
    length_cm: 50.0
  - name: "G"
    code: 7
    length_cm: 50.0
  - name: "H"
    code: 8
    length_cm: 50.0

segments:
  - name: "Segment_airPuff1"
    cue_sequence: ["A", "B", "C", "D"]
    transition_probabilities: [0.0, 1.0]

  - name: "Segment_airPuff2"
    cue_sequence: ["E", "F", "G", "H"]
    transition_probabilities: [1.0, 0.0]

vr_environment:
  corridor_spacing_cm: 20.0
  segments_per_corridor: 3
  padding_prefab_name: "Padding"
  cm_per_unity_unit: 10.0

trial_structures:
  ABCD:
    segment_name: "Segment_airPuff1"
    stimulus_trigger_zone_start_cm: 107.5
    stimulus_trigger_zone_end_cm: 142.5
    stimulus_location_cm: 157.5
    show_stimulus_collision_boundary: false
    puff_duration_ms: 100
    occupancy_duration_ms: 1000

  EFGH:
    segment_name: "Segment_airPuff2"
    stimulus_trigger_zone_start_cm: 157.5
    stimulus_trigger_zone_end_cm: 192.5
    stimulus_location_cm: 188.5
    show_stimulus_collision_boundary: false
    reward_size_ul: 5.0
    reward_tone_duration_ms: 300

experiment_states:
  baseline:
    experiment_state_code: 1
    system_state_code: 1
    state_duration_s: 600.0
    supports_trials: false
    supported_trial_structures: ["ABCD", "EFGH"]
    reinforcing_initial_guided_trials: 0
    reinforcing_recovery_failed_threshold: 0
    reinforcing_recovery_guided_trials: 0
    aversive_initial_guided_trials: 0
    aversive_recovery_failed_threshold: 0
    aversive_recovery_guided_trials: 0

  experiment:
    experiment_state_code: 2
    system_state_code: 2
    state_duration_s: 3000.0
    supports_trials: true
    supported_trial_structures: ["ABCD", "EFGH"]
    reinforcing_initial_guided_trials: 3
    reinforcing_recovery_failed_threshold: 6
    reinforcing_recovery_guided_trials: 3
    aversive_initial_guided_trials: 3
    aversive_recovery_failed_threshold: 6
    aversive_recovery_guided_trials: 3

  cooldown:
    experiment_state_code: 3
    system_state_code: 1
    state_duration_s: 600.0
    supports_trials: false
    supported_trial_structures: ["ABCD", "EFGH"]
    reinforcing_initial_guided_trials: 0
    reinforcing_recovery_failed_threshold: 0
    reinforcing_recovery_guided_trials: 0
    aversive_initial_guided_trials: 0
    aversive_recovery_failed_threshold: 0
    aversive_recovery_guided_trials: 0
