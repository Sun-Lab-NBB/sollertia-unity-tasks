# Connection Experiment Configuration
# This is an example unified YAML configuration for the Mesoscope VR behavioral task.
# This file serves both the Unity VR environment and the Python data acquisition/analysis systems.

# Unity scene metadata
unity_scene_name: "ConnectionTask"
cue_offset_cm: 0.0

# Cue definitions - single source of truth
# Each cue has a unique name (used in segment cue sequences), a unique uint8 code (for MQTT/analysis),
# and a length in centimeters. Cues are baked into segment prefabs, not loaded individually.
cues:
  - name: "Gray"
    code: 0
    length_cm: 30.0
  - name: "A"
    code: 1
    length_cm: 30.0
  - name: "B"
    code: 2
    length_cm: 30.0
  - name: "C"
    code: 3
    length_cm: 30.0
  - name: "D"
    code: 4
    length_cm: 30.0
  - name: "E"
    code: 5
    length_cm: 30.0
  - name: "F"
    code: 6
    length_cm: 30.0
  - name: "G"
    code: 7
    length_cm: 30.0

# Visual segment definitions for Unity corridor system
# Each segment is a sequence of cues with optional transition probabilities.
segments:
  - name: "Segment_abc"
    cue_sequence: ["A", "Gray", "B", "Gray", "C", "Gray"]
    transition_probabilities: [0.5, 0.5, 0.0, 0.0]

  - name: "Segment_abca"
    cue_sequence: ["A", "Gray", "B", "Gray", "C", "Gray", "A", "Gray"]
    transition_probabilities: [0.0, 0.0, 0.5, 0.5]

  - name: "Segment_defg"
    cue_sequence: ["D", "Gray", "E", "Gray", "F", "Gray", "G", "Gray"]
    transition_probabilities: [0.0, 0.0, 0.5, 0.5]

  - name: "Segment_defgd"
    cue_sequence: ["D", "Gray", "E", "Gray", "F", "Gray", "G", "Gray", "D", "Gray"]
    transition_probabilities: [0.5, 0.5, 0.0, 0.0]

# VR environment configuration
vr_environment:
  corridor_spacing_cm: 20.0
  segments_per_corridor: 3
  padding_prefab_name: "Padding"
  cm_per_unity_unit: 10.0

# Trial structures - behavioral overlays on segments
# The cue_sequence and trial_length_cm are derived from the segment_name reference.
# These are used by the Python data acquisition system (sl-experiment).
trial_structures:
  short_trial:
    segment_name: "Segment_abc"
    stimulus_trigger_zone_start_cm: 120.0
    stimulus_trigger_zone_end_cm: 150.0
    stimulus_location_cm: 135.0
    stimulus_trigger: "lick"
    guidance_trigger: "collision"
    reward_size_ul: 3.0
    reward_tone_duration_ms: 100

  long_trial:
    segment_name: "Segment_defg"
    stimulus_trigger_zone_start_cm: 180.0
    stimulus_trigger_zone_end_cm: 210.0
    stimulus_location_cm: 195.0
    stimulus_trigger: "lick"
    guidance_trigger: "collision"
    reward_size_ul: 5.0
    reward_tone_duration_ms: 100

# Experiment state machine
# Defines the phases/states of the experiment and which trials are used in each.
experiment_states:
  baseline:
    experiment_state_code: 1
    system_state_code: 0
    state_duration_s: 300.0
    supported_trial_structures: ["short_trial", "long_trial"]
    reinforcing_initial_guided_trials: 10
    reinforcing_recovery_failed_threshold: 5
    reinforcing_recovery_guided_trials: 3
